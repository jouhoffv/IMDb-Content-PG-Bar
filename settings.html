<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>BookmarkThat Settings</title>
  <script src="settings.js?v=2.1" defer></script>
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1080px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    .section { margin-bottom: 28px; }
    .checkbox-group, .inline { display: flex; gap: 12px; align-items: center; }
    .inline input, .inline select { min-width: 120px; }
  </style>
</head>
<body>
  <h1>BookmarkThat Settings</h1>

  <section class="section">
    <h2>Bookmark destination</h2>
    <label for="folderSelect">Select Bookmark Folder:</label>
    <select id="folderSelect"></select>
  </section>

  <section class="section">
    <h2>Firefox Container tab lifecycle</h2>
    <table>
      <thead>
        <tr>
          <th>Container</th><th>Enable</th><th>Unload (min)</th><th>Never unload</th><th>Reload (min)</th><th>Cleanup on reload</th>
        </tr>
      </thead>
      <tbody id="containerTableBody"></tbody>
    </table>
  </section>

  <section class="section">
    <h2>Scheduled page visits (independent of browser history)</h2>
    <div class="inline">
      <input id="ruleUrl" type="url" placeholder="https://example.com" />
      <input id="ruleInterval" type="number" min="1" value="60" />
      <select id="ruleContainer"></select>
      <label><input id="ruleBackground" type="checkbox" checked /> Open in background</label>
      <button id="addRuleButton">Add rule</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Enabled</th><th>URL</th><th>Interval (min)</th><th>Container</th><th>Last visit</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="visitRulesBody"></tbody>
    </table>
  </section>

  <section class="section">
    <h2>Delete old unused website data</h2>
    <div class="inline">
      <label><input id="cleanupEnabled" type="checkbox" /> Enable cleanup</label>
      <label>Remove data for sites inactive longer than
        <select id="cleanupRetentionDays">
          <option value="30">30 days</option>
          <option value="90">90 days</option>
        </select>
      </label>
      <button id="runCleanupNow">Run now</button>
    </div>
  </section>
</body>
</html>
